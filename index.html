<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleo de Nile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        .character-image {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }

        p {
            line-height: 1.6;
            color: #666;
        }
    </style>
</head>

<body>

        <div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 login-card">
            <h2 class="text-center mb-4">Múmia Real Login</h2>
            <div id="msgErro" class="alert alert-danger d-none"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Usuário</label>
                    <input type="text" id="usuario" class="form-control" placeholder="admin">
                </div>
                <br>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="1234">
                </div>
                <button type="submit" class="btn btn-egypt w-100">Entrar na Pirâmide</button>
            </form>
        </div>
    </div>
</div> 
<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('usuario').value;
        const pass = document.getElementById('senha').value;
        const msg = document.getElementById('msgErro');

        msg.classList.add('d-none');

        if(user === "" || pass === "") {
            msg.textContent = "Os campos não podem estar vazios!";
            msg.classList.remove('d-none');
        } else if(user === "admin" && pass === "1234") {
            window.location.href = "home.html";
        } else {
            msg.textContent = "Dados incorretos, reles mortal!";
            msg.classList.remove('d-none');
        }
    });
</script>
</body>

</html>
